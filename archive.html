  <meta charset="UTF-8" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b0b;
      color: #e0a106;
      font-family: "Courier New", Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      width: 100%;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .status {
      text-align: center;
      color: #c9472d;
      margin-bottom: 30px;
      font-size: 14px;
      letter-spacing: 1px;
      font-weight: bold;
    }

    .text {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .archive-container {
      border-top: 1px solid #222;
      padding-top: 10px;
    }

    .archive-entry {
      padding: 20px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .transmission-id {
      color: #666;
      font-size: 11px;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .transmission-status {
      color: #666;
      font-size: 11px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .transmission-link {
      color: #e0a106;
      text-decoration: none;
      font-size: 18px;
      letter-spacing: 1px;
      line-height: 1.4;
    }

    .transmission-link:hover {
      color: #ffffff;
    }

    .transmission-date {
      color: #666;
      font-size: 11px;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    .back-link {
      margin-top: 40px;
      text-align: center;
    }

    .back-link a {
      color: #888;
      text-decoration: none;
      font-size: 12px;
    }

    .back-link a:hover {
      color: #e0a106;
    }

    @media (max-width: 768px) {
      .transmission-link {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>ARCHIVED TRANSMISSIONS</h1>

    <div class="status">
      STATUS: ARCHIVE ACCESS PERMITTED
    </div>

    <div class="text">
      Historical transmissions have been indexed for continuity review.<br>
      Some records may be incomplete, corrupted, or internally inconsistent.<br>
      Signal degradation increases with archive depth.
    </div>

    <div id="archive-list" class="archive-container">
      <!-- archive.js populates this -->
    </div>

    <div class="back-link">
      <a href="/">Return to active transmission</a>
    </div>

  </div>

  <script src="/archive.js"></script>
</body>
